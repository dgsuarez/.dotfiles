# remap prefix to Control + a
set -g prefix C-a
# bind 'C-a C-a' to type 'C-o'
bind C-a select-pane -t :.+
unbind C-b

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

setw -g mouse on

set -g mode-keys emacs
set -g status-keys emacs

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g escape-time 11
set -g history-limit 50000

# Pass bell through to terminal (for Ghostty dock badge)
set -g visual-bell off
set -g bell-action any

# Allow OSC passthrough for native Ghostty notifications
set -g allow-passthrough all

set-option -g status-right-length 140

set -g status-right '%Y-%m-%d %H:%M '
set -ag status-right "#[bg=cyan] #(awk '/^current-context:/{print $2;exit;}' <~/.kube/config)"

# Copy-mode: emacs-style selection + pipe to macOS clipboard via pbcopy
bind Space copy-mode
bind p      paste-buffer
bind C-p    choose-buffer

bind -T copy-mode C-Space send -X begin-selection
bind -T copy-mode M-w     send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode Enter   send -X copy-pipe-and-cancel "pbcopy"

# Mouse: drag-select auto-copies without exiting copy-mode
bind -T copy-mode MouseDragEnd1Pane  send -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode DoubleClick1Pane   select-pane \; send -X select-word \; send -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode TripleClick1Pane   select-pane \; send -X select-line \; send -X copy-pipe-no-clear "pbcopy"
